#!/usr/bin/env ansible-playbook
---
# Play 1: Discover Tailscale IP on every node and run pre-flight assertions.
# Runs across all hosts first so hostvars['tailscale_ip'] is populated
# before any kubeadm operation in the plays below.
- name: Discover Tailscale IPs and assert pre-flight conditions
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Get Tailscale IPv4 address
      command: tailscale ip -4
      register: tailscale_ip_raw
      changed_when: false

    - name: Set tailscale_ip fact
      set_fact:
        tailscale_ip: "{{ tailscale_ip_raw.stdout | trim }}"

# Play 2: Initialise the Kubernetes control plane on the bootstrap node.
- name: Bootstrap Kubernetes control plane
  hosts: bootstrap_node
  gather_facts: false
  become: true
  tasks:
    - name: Pull control plane images
      command: kubeadm config images pull
      changed_when: false

    - name: Template kubeadm init config
      template:
        src: kubeadm-init.yaml
        dest: /var/tmp/kubeadm-init.yaml

    - name: Initialize Kubernetes cluster
      command: kubeadm init --config /var/tmp/kubeadm-init.yaml
      args:
        creates: /etc/kubernetes/admin.conf

    # Verify API server is listening on the Tailscale interface, not just loopback.
    # If tailscaled stops after init, this address becomes unreachable and the
    # cluster loses all peer connectivity (Tailscale-down = cluster-down).
    - name: Wait for API server on Tailscale interface
      wait_for:
        host: "{{ tailscale_ip }}"
        port: 6443
        delay: 5
        timeout: 120

    - name: Set KUBECONFIG for root user
      lineinfile:
        path: /root/.bashrc
        regexp: '^export KUBECONFIG='
        line: "export KUBECONFIG=/etc/kubernetes/admin.conf"

    - name: Approve pending kubelet serving CSRs
      shell: kubectl get csr -o name | xargs --no-run-if-empty kubectl certificate approve
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: Get tailscale0 MTU
      shell: cat /sys/class/net/tailscale0/mtu
      register: tailscale_mtu_raw
      changed_when: false

    - name: Set Cilium MTU (tailscale0 MTU minus 50 bytes VXLAN overhead)
      set_fact:
        cilium_mtu: "{{ tailscale_mtu_raw.stdout | trim | int - 50 }}"

    - name: Install Gateway API CRDs
      command: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v{{ gateway_api_version }}/standard-install.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: Install Cilium
      command: >-
        cilium install
        --version {{ cilium_version }}
        --set ipam.mode=kubernetes
        --set routingMode=tunnel
        --set tunnelProtocol=vxlan
        --set kubeProxyReplacement=true
        --set k8sServiceHost={{ tailscale_ip }}
        --set k8sServicePort=6443
        --set MTU={{ cilium_mtu }}
        --set gatewayAPI.enabled=true
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      args:
        creates: /etc/cni/net.d/05-cilium.conflist

    - name: Wait for Cilium to be ready
      command: cilium status --wait
      changed_when: false
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

    - name: Generate worker join command
      command: kubeadm token create --print-join-command
      changed_when: false
      register: join_cmd_output

    - name: Parse join token and CA cert hash
      set_fact:
        join_token: "{{ join_cmd_output.stdout | regex_search('--token (\\S+)', '\\1') | first }}"
        join_ca_hash: "{{ join_cmd_output.stdout | regex_search('--discovery-token-ca-cert-hash (\\S+)', '\\1') | first }}"

# Play 3: Join worker nodes to the cluster.
- name: Join worker nodes to cluster
  hosts: worker_nodes
  gather_facts: false
  become: true
  tasks:
    - name: Set cluster join facts from bootstrap node
      set_fact:
        bootstrap_tailscale_ip: "{{ hostvars[groups['bootstrap_node'][0]]['tailscale_ip'] }}"
        join_token: "{{ hostvars[groups['bootstrap_node'][0]]['join_token'] }}"
        join_ca_hash: "{{ hostvars[groups['bootstrap_node'][0]]['join_ca_hash'] }}"

    - name: Template kubeadm join config
      template:
        src: kubeadm-join.yaml
        dest: /var/tmp/kubeadm-join.yaml

    - name: Join cluster as worker node
      command: kubeadm join --config /var/tmp/kubeadm-join.yaml
      args:
        creates: /etc/kubernetes/kubelet.conf

# Play 4: Assert all node INTERNAL-IPs are Tailscale addresses.
- name: Verify node IP registration
  hosts: bootstrap_node
  gather_facts: false
  become: true
  tasks:
    - name: Get all node internal IPs
      shell: >-
        kubectl get nodes
        -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: node_ips_output
      changed_when: false

    - name: Assert nodes are registered
      assert:
        that:
          - node_ips_output.stdout_lines | length > 0
        fail_msg: "No nodes found in cluster"

    - name: Assert all node IPs are in Tailscale CGNAT range 100.64.0.0/10
      assert:
        that:
          - item is match('^100\.(6[4-9]|[7-9][0-9]|1[0-1][0-9]|12[0-7])\.')
        fail_msg: "Node IP {{ item }} is not in 100.64.0.0/10 — check kubelet --node-ip registration"
      loop: "{{ node_ips_output.stdout_lines | select('match', '.+') | list }}"

# Play 5: Install cluster add-ons via Helm.
- name: Install cluster add-ons
  hosts: bootstrap_node
  gather_facts: false
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  pre_tasks:
    - name: Load overrides if present
      include_vars: "{{ item }}"
      with_first_found:
        - files:
            - overrides.yaml
          skip: true
  tasks:
    - name: Add ingress-nginx Helm repo
      command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
      changed_when: false

    - name: Add metrics-server Helm repo
      command: helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
      changed_when: false

    - name: Update Helm repos
      command: helm repo update
      changed_when: false

    - name: Install ingress-nginx
      command: >-
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
        --version {{ ingress_nginx_version }}
        --namespace ingress-nginx
        --create-namespace
        --set controller.service.type=LoadBalancer
        --wait

    - name: Install metrics-server
      command: >-
        helm upgrade --install metrics-server metrics-server/metrics-server
        --version {{ metrics_server_version }}
        -n kube-system

    - name: Install local-path-provisioner
      command: kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v{{ local_path_provisioner_version }}/deploy/local-path-storage.yaml
      changed_when: true

    - name: Set local-path as default StorageClass
      command: >-
        kubectl patch storageclass local-path
        -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      changed_when: true
