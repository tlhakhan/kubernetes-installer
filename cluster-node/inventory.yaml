all:
  vars:
    controlplane_schedulable: false
    cluster_name: "kubernetes"
    kubernetes_version: "1.34"
    cilium_version: "1.19.3"
    tailscale_operator_version: "1.84.0"
    ingress_nginx_version: "4.12.3"
    metrics_server_version: "3.12.2"
    tailscale_oauth_client_id: ""
    tailscale_oauth_client_secret: ""

  children:
    bootstrap_node:
      hosts:
        kube-1.local:
          controlplane_schedulable: true
        cluster-2.local:
          cluster_name: "cluster-2"
          controlplane_schedulable: true

    worker_nodes:
      hosts:
        kube-2.local: {}